<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Shop</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <div class="logo">
        <img src="images/logo.png" alt="Logo">
        <h2>MY SHOP</h2>
    </div>
</header>

<div class="container">

    <div class="welcome">
        <h1>Добро пожаловать 👋</h1>
        <p>Выберите игру</p>
    </div>

    <div class="card">
        <img src="images/brawl.jpg">
        <h3>Brawl Stars</h3>
        <button>Открыть</button>
    </div>

    <div class="card">
        <img src="images/clashroyale.jpg">
        <h3>Clash Royale</h3>
        <button>Открыть</button>
    </div>

    <div class="card">
        <img src="images/clashofclans.jpg">
        <h3>Clash of Clans</h3>
        <button>Открыть</button>
    </div>

    <div class="card">
        <img src="images/hayday.jpg">
        <h3>Hay Day</h3>
        <button>Открыть</button>
    </div>

    <div class="card">
        <img src="images/roblox.jpg">
        <h3>Roblox</h3>
        <button>Открыть</button>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
