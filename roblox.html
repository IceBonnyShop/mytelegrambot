<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roblox Shop</title>

<style>
body{
    margin:0;
    background:#111827;
    font-family:Arial,sans-serif;
    color:white;
}

header{
    background:#1f2937;
    text-align:center;
    padding:20px;
    font-size:30px;
    font-weight:bold;
}

.container{
    max-width:900px;
    margin:auto;
    padding:20px;
}

.item{
    background:#1f2937;
    border-radius:15px;
    padding:20px;
    margin-bottom:20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.info h2{
    margin:0;
    font-size:26px;
}

.price{
    margin-top:8px;
    color:#00ff88;
    font-size:20px;
    font-weight:bold;
}

.buy{
    background:#2563eb;
    color:white;
    border:none;
    border-radius:10px;
    padding:12px 28px;
    font-size:18px;
    cursor:pointer;
}

.buy:hover{
    background:#1d4ed8;
}
</style>

</head>
<body>

<header>
🟩 Roblox Shop
</header>

<div class="container">

<div class="item">
<div class="info">
<h2>💎 40 Robux</h2>
<div class="price">0.83 AZN / 37.45 ₽</div>
</div>
<button class="buy">Купить</button>
</div>

<div class="item">
<div class="info">
<h2>💎 80 Robux</h2>
<div class="price">1.70 AZN / 75.87 ₽</div>
</div>
<button class="buy">Купить</button>
</div>

<div class="item">
<div class="info">
<h2>💎 400 Robux</h2>
<div class="price">8.50 AZN / 382.41 ₽</div>
</div>
<button class="buy">Купить</button>
</div>

<div class="item">
<div class="info">
<h2>💎 800 Robux</h2>
<div class="price">17.98 AZN / 765.60 ₽</div>
</div>
<button class="buy">Купить</button>
</div>

<div class="item">
<div class="info">
<h2>💎 1200 Robux</h2>
<div class="price">25.50 AZN / 1148.78 ₽</div>
</div>
<button class="buy">Купить</button>
</div>

<div class="item">
<div class="info">
<h2>💎 1700 Robux</h2>
<div class="price">33.98 AZN / 1531.96 ₽</div>
</div>
<button class="buy">Купить</button>
</div>

<div class="item">
<div class="info">
<h2>💎 3150 Robux</h2>
<div class="price">59.50 AZN / 2681.50 ₽</div>
</div>
<button class="buy">Купить</button>
</div>

<div class="item">
<div class="info">
<h2>💎 4500 Robux</h2>
<div class="price">84.98 AZN / 3831.04 ₽</div>
</div>
<button class="buy">Купить</button>
</div>

</div>

</body>
</html>
