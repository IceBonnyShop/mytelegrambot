<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roblox Shop</title>

<style>
body{
    margin:0;
    background:#111827;
    color:white;
    font-family:Arial;
}

header{
    background:#1f2937;
    padding:20px;
    text-align:center;
    font-size:30px;
    font-weight:bold;
}

.container{
    max-width:900px;
    margin:auto;
    padding:20px;
}

.item{
    background:#1f2937;
    border-radius:15px;
    padding:20px;
    margin-bottom:20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.left{
    font-size:22px;
    font-weight:bold;
}

.price{
    color:#00ff88;
    font-size:20px;
}

.buy{
    background:#2563eb;
    color:white;
    border:none;
    padding:12px 30px;
    border-radius:10px;
    cursor:pointer;
    font-size:18px;
}

.buy:hover{
    background:#1d4ed8;
}
</style>

</head>
<body>

<header>
🟩 Roblox Shop
</header>

<div class="container">

<div class="item">
<div>
<div class="left">80 Robux</div>
<div class="price">1.50 ₼</div>
</div>
<button class="buy">Купить</button>
</div>

<div class="item">
<div>
<div class="left">400 Robux</div>
<div class="price">6.50 ₼</div>
</div>
<button class="buy">Купить</button>
</div>

<div class="item">
<div>
<div class="left">800 Robux</div>
<div class="price">12 ₼</div>
</div>
<button class="buy">Купить</button>
</div>

<div class="item">
<div>
<div class="left">1700 Robux</div>
<div class="price">24 ₼</div>
</div>
<button class="buy">Купить</button>
</div>

<div class="item">
<div>
<div class="left">4500 Robux</div>
<div class="price">55 ₼</div>
</div>
<button class="buy">Купить</button>
</div>

<div class="item">
<div>
<div class="left">10000 Robux</div>
<div class="price">110 ₼</div>
</div>
<button class="buy">Купить</button>
</div>

</div>

</body>
</html>
